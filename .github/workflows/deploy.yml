name: Deploy to Cloud Run

on:
  push:
    branches:
      - main  # main ブランチへの push で自動デプロイ

env:
  GCP_REGION: asia-northeast1
  SERVICE_NAME: estimation-analysis-app
  IMAGE: asia-northeast1-docker.pkg.dev/line-cw-estimate2pricesearch/cloud-run-source-deploy/estimation-analysis-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation に必要

    steps:
      # 1. ソースコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. GCP 認証（Workload Identity Federation - キーファイル不要）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 3. gcloud CLI のセットアップ
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Artifact Registry への Docker 認証
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      # 5. Docker イメージのビルドとプッシュ
      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # 6. Cloud Run へデプロイ
      #    環境変数は Cloud Run コンソールで管理しているため --set-env-vars は指定しない。
      #    既存の環境変数は再デプロイ時も自動で引き継がれる。
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:${{ github.sha }} \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 10

      # 7. デプロイ先 URL を出力
      - name: Show deployed URL
        run: |
          echo "✅ Deployed to:"
          gcloud run services describe $SERVICE_NAME \
            --region $GCP_REGION \
            --format="value(status.url)"
